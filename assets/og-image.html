<!-- OG image source — render to PNG with:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
       --headless=new --screenshot=assets/og-image.png \
       --window-size=1200,630 --hide-scrollbars --force-device-scale-factor=1 \
       "file://$PWD/assets/og-image.html"
     Fonts are self-hosted — no internet connection required. -->
<!DOCTYPE html>
<html style="margin:0;padding:0;width:1200px;height:630px">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Plus Jakarta Sans';
      font-style: normal;
      font-weight: 100 900;
      font-display: block;
      src: url('fonts/PlusJakartaSans-400.woff2') format('woff2');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #44513A;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .mark svg {
      display: block;
    }

    .wordmark {
      font-size: 104px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -3px;
    }

    .wordmark .ops { color: #EEF2EA; }
    .wordmark .olive { color: #E07A5F; }

    .tagline {
      font-size: 34px;
      font-weight: 400;
      color: #C4CDBA;
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="mark">
      <svg width="96" height="96" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="46" height="46" rx="13" fill="#EEF2EA" stroke="#C4CDBA"/>
        <ellipse cx="31" cy="14" rx="7.5" ry="4" transform="rotate(42 31 14)" fill="#5F7350"/>
        <ellipse cx="23" cy="27" rx="10.5" ry="13.5" transform="rotate(-16 23 27)" fill="#44513A"/>
        <circle cx="23" cy="27" r="3.6" fill="#E07A5F"/>
      </svg>
    </div>
    <div class="wordmark">
      <span class="ops">Ops</span><span class="olive">Olive</span>
    </div>
    <div class="tagline">The oil that keeps your operations running.</div>
  </div>
</body>
</html>
